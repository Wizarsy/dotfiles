# monitor = eDP-1, 1920x1200@60.00, auto, 1
monitor = , preferred, auto, 1
monitor = Unknown-1, disabled

general {
  border_size = 1
  gaps_in = 8
  gaps_out = 10
  col.active_border = rgb(24283b)
  col.inactive_border = rgb(24283b)
  layout = dwindle
  resize_on_border = true
  extend_border_grab_area = 10
  hover_icon_on_border = true
  allow_tearing = true
  snap {
    enabled = true
    window_gap = 20
    monitor_gap = 20
    respect_gaps = true
  }
}

decoration {
  rounding = 0
  active_opacity = 1.0
  inactive_opacity = 1.0
  fullscreen_opacity = 1.0
  dim_modal = true
  border_part_of_window = true
  blur {
    enabled = true
    new_optimizations = true
    special = true
  }
  shadow {
    enabled = true
    range = 6
    render_power = 2
    sharp = false
    ignore_window = true
    color = rgb(16161e)
  }
}

animations {
  enabled = yes, please :)

  bezier = easeInOutQuint,0.83,0,0.17,1
  bezier = easeOutQuint,0.22,1,0.36,1
  bezier = easeInOutCubic,0.65,0.05,0.36,1
  bezier = linear,0,0,1,1
  bezier = almostLinear,0.5,0.5,0.75,1.0
  bezier = quick,0.15,0,0.1,1

  animation = global, 1, 10, default
  animation = border, 1, 5.39, easeOutQuint

  animation = windowsIn, 1, 2.0, easeInOutQuint, slide bottom
  animation = windowsOut, 1, 2.55, easeOutQuint, slide bottom
  animation = windowsMove, 1, 1.7, linear, slide

  animation = fadeIn, 1, 1.73, almostLinear
  animation = fadeOut, 1, 1.46, almostLinear
  animation = fade, 1, 3.03, quick
  
  animation = layers, 1, 3.81, easeOutQuint
  animation = layersIn, 1, 4, easeOutQuint, fade
  animation = layersOut, 1, 1.5, linear, fade
  
  animation = fadeLayersIn, 1, 1.79, almostLinear
  animation = fadeLayersOut, 1, 1.39, almostLinear

  animation = workspacesIn, 1, 1.5, linear, slidefade
  animation = workspacesOut, 1, 2.65, linear, slidefade

  animation = specialWorkspaceIn, 1, 1.3, almostLinear, slidefade top 20%
  animation = specialWorkspaceOut, 1, 1.75, almostLinear, slidefade bottom 35%
}

misc {
  vrr = 3
  mouse_move_enables_dpms = true
  # disable_hyprland_logo = false
  # background_color =
  enable_swallow = true
  swallow_regex = ^(kitty|foot|Alacritty|wezterm|ghostty)$
}

dwindle {
  pseudotile = true
  preserve_split = true
  precise_mouse_move = true
}

master {
  new_status = slave
}

binds {
  drag_threshold = 10
}

xwayland {
  enabled = true
  force_zero_scaling = true
  use_nearest_neighbor = true
}

opengl {
  nvidia_anti_flicker = true
}

render {
  direct_scanout = 2
  send_content_type = true
  cm_fs_passthrough = 2
  cm_enabled = true
  cm_auto_hdr = 1
}

cursor {
  # default_monitor = eDP-1
  sync_gsettings_theme = true
  enable_hyprcursor = true
  use_cpu_buffer = 2
  no_hardware_cursors = 0
}

ecosystem {
  enforce_permissions = true
}

quirks {
  prefer_hdr = 1
}

source = ~/.config/hypr/hyprland.d/*

